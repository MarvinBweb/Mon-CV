<html>
   <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <title></title>
      <meta name="description" content="">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="stylesheet" href="">
   </head>
   <body>

   <form action="" method="get" name="formulaire">
      
      <fieldset>
         <legend>Formulaire de contact</legend>
         <label for="name">Nom</label>
         <input type="text" name="name">
         <label for="firstname">prenom</label>
         <input type="text" name="firstname">
         <label for="mail">email</label>
         <input type="email" name="mail">
      </fieldset>
      <br />

      <fieldset>
         <legend>Competences</legend>

         <input type="checkbox" name="Javascript">
         <label for="Javascript">Javascript</label>

         <input type="checkbox" name="PHP">
         <label for="PHP">PHP</label>

         <input type="checkbox" name="C#">
         <label for="C#">C#</label>

         <input type="checkbox" name="Ruby">
         <label for="Ruby">Ruby</label>

         <input type="checkbox" name="React">
         <label for="React">React</label>

         <label for="Nodejs">Java</label>
         <input type="checkbox" name="Nodejs">
      </fieldset>
      <br />
      <fieldset>
         <legend>Genre</legend>
         <label for="homme">Homme</label>
         <input type="radio" name="homme">

         <label for="femme">Femme</label>
         <input type="radio" name="femme">

         <label for="autre">Autre</label>
         <input type="radio" name="autre">
      </fieldset>

      <br />
      <fieldset>
         <legend>Message</legend>
         <input type="text" name="message">
      </fieldset>
      <br />
      <fieldset>
         <legend>Poste</legend>
         <select name="poste">
            <option value="developpeur">Developpeur</option>
            <option value="integrateur">integrateur</option>
            <option value="concepteur">concepteur</option>
         </select>
      </fieldset>

      <br />

      <input type="submit" value="Envoyer">


   </form>


</body>

</html>
